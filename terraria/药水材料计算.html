<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂月的药水工坊</title>
    <style>
        :root {
            --bg: #2c1c13; --panel: #1a120c; --border: #7a5a4d; --gold: #ffca00; 
            --cyan: #00e5ff; --lime: #b5e61d; --text: #fdf6e3; --card-bg: rgba(255, 255, 255, 0.03);
            --anim-speed: 0.3s;
        }

        body { background: #1a1a1b; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; color: var(--text); user-select: none; margin: 0; }
        .calc-card { background: var(--bg); border: 2px solid var(--border); padding: 25px; border-radius: 12px; width: 100%; max-width: 1200px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; }

        .version-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .title { text-align: center; color: var(--gold); font-size: 26px; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; letter-spacing: 2px; }

        .control-panel { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .mode-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
        .mode-window { width: 140px; height: 36px; background: #000; border: 1px solid var(--border); border-radius: 18px; overflow: hidden; cursor: pointer; }
        .mode-reel { display: flex; flex-direction: column; transition: transform var(--anim-speed) cubic-bezier(0.45, 0.05, 0.55, 0.95); height: 100%; }
        .mode-unit { height: 36px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; color: var(--cyan); flex-shrink: 0; }
        .mode-unit.qty { color: var(--lime); }
        input[type="number"] { background: #000; border: 1px solid var(--border); color: var(--cyan); padding: 8px; border-radius: 4px; width: 80px; text-align: center; font-weight: bold; outline: none; transition: 0.2s; }
        input[type="number"]:focus { border-color: var(--gold); }
        
        .preset-grid { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn-preset {
            width: 70px;
            height: 32px;
            background: #3d2b1f;
            border: 1px solid var(--border);
            color: var(--gold);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s ease, background 0.3s, border-color 0.3s;
        }
        .btn-preset.active { border-color: var(--gold); background: rgba(255, 202, 0, 0.15); box-shadow: inset 0 0 8px rgba(255,202,0,0.2); }
        .btn-preset-fade-out { opacity: 0; }
        .btn-preset-appear { animation: presetAppear 0.3s ease-out; }
        @keyframes presetAppear { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        .unit-text { font-size: 13px; color: var(--gold); width: 50px; transition: opacity 0.15s ease; }
        .unit-fade-out { opacity: 0; }

        /* 分类列表上方控制条 */
        .category-toolbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .global-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .global-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--lime);
            cursor: pointer;
        }
        .toolbar-buttons {
            display: flex;
            gap: 10px;
        }
        .toolbar-btn {
            background: #3d2b1f;
            border: 1px solid var(--border);
            color: var(--gold);
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .toolbar-btn:hover {
            background: #5a3e2e;
        }

        /* 分类列表容器 */
        .category-list-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .category-node {
            margin-bottom: 6px;
            border-left: 4px solid;
            border-radius: 0 8px 8px 0;
            background: rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .category-node:hover {
            background: rgba(255,255,255,0.05);
        }

        .category-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 0 8px 8px 0;
        }
        .category-checkbox {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: var(--lime);
            cursor: pointer;
        }
        .category-name {
            font-size: 14px;
            color: var(--gold);
            font-weight: bold;
            margin-right: 8px;
        }
        .category-desc {
            font-size: 11px;
            color: #aaa;
            font-style: italic;
            flex: 1;
        }
        .category-expand {
            width: 24px;
            text-align: center;
            color: var(--cyan);
            font-weight: bold;
            transition: transform 0.2s;
        }
        .category-expand.expanded {
            transform: rotate(90deg);
        }

        /* 子容器动画 - 优化性能 */
        .category-children {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.2s ease;
            margin-left: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            will-change: max-height, opacity;
        }
        .category-node.expanded > .category-children {
            max-height: 2000px;
            opacity: 1;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        /* 子分类节点在网格中应独占一行 */
        .category-children > .category-node {
            grid-column: 1 / -1;
        }

        /* 药水卡片 */
        .potion-item {
            background: var(--card-bg);
            border: 1px solid rgba(122,90,77,0.3);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: border-color var(--anim-speed), background-color var(--anim-speed);
            position: relative;
            box-sizing: border-box;
            height: fit-content;
        }
        .potion-item.active { border-color: var(--lime); background: rgba(181, 230, 29, 0.05); }
        .toggle-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 30px;
            height: 16px;
            background: #444;
            border-radius: 10px;
            transition: background-color 0.4s;
        }
        .toggle-btn::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.4s;
        }
        .active .toggle-btn { background: var(--lime); }
        .active .toggle-btn::after { left: 16px; }

        .p-body { margin-top: 25px; }
        .potion-name {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .potion-name img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .p-tips { font-size: 11px; color: var(--gold); line-height: 1.4; margin-bottom: 8px; }
        .p-desc { font-size: 10px; color: #888; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }

        .prodesc-container {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.2s ease;
            margin-top: 0;
            border-top: none;
            padding-top: 0;
            will-change: max-height, opacity;
        }
        .active .prodesc-container {
            max-height: 200px;
            opacity: 1;
            margin-top: 12px;
            border-top: 1px dashed var(--border);
            padding-top: 10px;
        }
        .prodesc-text { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; font-size: 11px; color: var(--cyan); line-height: 1.4; word-break: break-word; }

        .summary-box { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; border: 1px solid var(--gold); display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .section-title { color: var(--gold); font-weight: bold; border-bottom: 1px solid rgba(255,202,0,0.3); margin-bottom: 10px; padding-bottom: 5px; font-size: 14px; }
        .list-container { position: relative; min-height: 50px; }
        .line-item { 
            font-size: 13px; color: var(--lime); display: flex; justify-content: space-between; align-items: center;
            padding: 4px 0; border-bottom: 1px dotted rgba(255,255,255,0.05); 
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            max-height: 40px;
            opacity: 1; overflow: hidden; transform-origin: top;
        }
        .line-item .item-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .line-item .item-left img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }
        .line-enter-left { animation: slideInLeft 0.5s forwards; }
        .line-enter-right { animation: slideInRight 0.5s forwards; }
        .line-removing {
            color: #ff4444 !important;
            text-decoration: line-through;
            opacity: 1;
            max-height: 40px;
        }
        .line-exit { 
            opacity: 0 !important; 
            max-height: 0 !important; 
            padding-top: 0 !important; 
            padding-bottom: 0 !important; 
            border-bottom-color: transparent !important;
            pointer-events: none;
        }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .val-text { display: inline-block; transition: color 0.3s; position: relative; }
        .val-flash { animation: valueFlash 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes valueFlash { 0% { color: #fff; transform: scale(1.4); text-shadow: 0 0 10px #fff; } 100% { color: var(--lime); transform: scale(1); text-shadow: none; } }
        .val-container { position: relative; display: inline-flex; align-items: center; }
        .delta-pop { 
            position: absolute; 
            right: 100%; 
            margin-right: 8px; 
            top: -2px;
            font-size: 12px; font-weight: bold; pointer-events: none; 
            animation: floatUp 1.2s ease-out forwards; /* 延长动画时间至1.2s */
            z-index: 10; 
            text-shadow: 1px 1px 2px #000; white-space: nowrap;
        }
        .delta-pos { color: var(--lime); }
        .delta-neg { color: #ff4444; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-20px) scale(1.2); } /* 稍微调高移动距离 */
        }
        .empty-tip { color: #666; font-size: 12px; padding: 4px 0; }
    </style>
</head>
<body>
<div class="calc-card">
    <div class="version-tag" id="version-tag">v22</div>
    <div class="title">🧪 寂月的药水工坊</div>
    <div class="control-panel">
        <div class="mode-row">
            <div class="mode-window" onclick="toggleMode()">
                <div class="mode-reel" id="mode-reel">
                    <div class="mode-unit">持续时长模式</div>
                    <div class="mode-unit qty">制作瓶数模式</div>
                </div>
            </div>
            <input type="number" id="global-val" value="60" min="1" oninput="validateAndCalc(this)" onkeydown="return event.key !== '-' && event.key !== 'e'">
            <span id="unit-text" class="unit-text">分钟</span>
        </div>
        <div class="preset-grid" id="preset-container"></div>
    </div>

    <!-- 分类列表上方工具栏 -->
    <div class="category-toolbar">
        <div class="global-checkbox">
            <input type="checkbox" id="global-select">
            <label for="global-select">全选</label>
        </div>
        <div class="toolbar-buttons">
            <button class="toolbar-btn" id="expand-all">全部展开</button>
            <button class="toolbar-btn" id="collapse-all">全部收起</button>
        </div>
    </div>

    <div class="category-list-container" id="category-list"></div>

    <div class="summary-box">
        <div>
            <div class="section-title">制作清单 <span id="total-info" style="font-size:11px; font-weight:normal; color:#666;"></span></div>
            <div id="bottle-output" class="list-container"></div>
        </div>
        <div>
            <div class="section-title">材料汇总</div>
            <div id="mat-output" class="list-container"></div>
        </div>
    </div>
</div>

<script>
(function() {
    // ==================== 版本号 ====================
    const VERSION = 'v22';
    document.getElementById('version-tag').innerText = VERSION;

    // ==================== 材料图标映射 ====================
    const materialIcons = {
        "瓶装水": "Bottle.png", // 示例图标名，实际需替换
        "太阳花": "Daybloom.png",
        "铁矿": "Iron_Ore.png",
        "死亡草": "Deathweed.png",
        "月光草": "Moonglow.png",
        "发光蘑菇": "Glowing_Mushroom.png",
        "火焰花": "Fireblossom.png",
        "闪耀根": "Shiverthorn.png", // 示例
        "寒颤棘": "Shiverthorn.png",
        "水叶草": "Waterleaf.png",
        "珊瑚": "Coral.png",
        "羽毛": "Feather.png",
        "瓢虫": "Ladybug.png",
        "黑珍珠": "Black_Pearl.png",
        // 可以继续添加
    };

    // 基础图片URL
    const IMG_BASE_URL = "https://terraria.wiki.gg/images/";

    // ==================== 数据 ====================
    const potionHierarchy = [
        {
            id: "cat_base",
            name: "基础药水",
            desc: "最基本的药水类别",
            list_0: [
                {
                    id: "cat_combat",
                    name: "战斗药水",
                    desc: "提升战斗能力",
                    list_1: [
                        {
                            id: "cat_melee",
                            name: "近战",
                            desc: "增强近战输出",
                            items: [
                                { id: "ironskin", name: "铁皮药水", time: 8, tooltips: "增加防御力", desc: "防御力增加8点。", materials: { "瓶装水": 1, "太阳花": 1, "铁矿": 1 }, icon: "Ironskin_Potion.png" },
                                { id: "rage", name: "怒气药水", time: 4, tooltips: "增加暴击", desc: "提高暴击几率。", materials: { "瓶装水": 1, "死亡草": 1, "月光草": 1 }, icon: "Rage_Potion.png" }
                            ]
                        },
                        {
                            id: "cat_ranged",
                            name: "远程",
                            desc: "增强远程输出",
                            items: [
                                { id: "archery", name: "箭术药水", time: 8, tooltips: "增加远程伤害", desc: "远程伤害提高20%。", materials: { "瓶装水": 1, "太阳花": 1, "发光蘑菇": 1 }, icon: "Archery_Potion.png" }
                            ]
                        }
                    ]
                },
                {
                    id: "cat_heal",
                    name: "治疗药水",
                    desc: "恢复生命",
                    items: [
                        { id: "regen", name: "再生药水", time: 8, tooltips: "生命恢复加快", desc: "每秒恢复2点生命值。", materials: { "瓶装水": 1, "太阳花": 1, "蘑菇": 1 }, icon: "Regeneration_Potion.png" }
                    ]
                },
                // 混合测试分类：同时包含子分类和直接卡片
                {
                    id: "cat_mix",
                    name: "混合测试",
                    desc: "同时包含卡片和子分类",
                    items: [
                        { id: "test1", name: "测试药水1", time: 5, tooltips: "测试占位", desc: "这是一个测试卡片。", materials: { "瓶装水": 1 }, icon: "Spelunker_Potion.png" },
                        { id: "test2", name: "测试药水2", time: 6, tooltips: "测试占位", desc: "另一个测试卡片。", materials: { "瓶装水": 1 }, icon: "Spelunker_Potion.png" },
                        { id: "test3", name: "测试药水3", time: 7, tooltips: "测试占位", desc: "第三个测试卡片。", materials: { "瓶装水": 1 }, icon: "Spelunker_Potion.png" }
                    ],
                    list_0: [
                        {
                            id: "cat_mix_sub",
                            name: "测试子分类",
                            desc: "子分类测试",
                            items: [
                                { id: "sub_test1", name: "子测试1", time: 3, tooltips: "子分类卡片", desc: "子分类下的卡片", materials: { "瓶装水": 1 }, icon: "Spelunker_Potion.png" }
                            ]
                        }
                    ]
                }
            ]
        },
        {
            id: "cat_other",
            name: "其他药水",
            desc: "特殊效果药水",
            list_0: [
                {
                    id: "cat_luck",
                    name: "幸运",
                    desc: "提升运气",
                    items: [
                        { id: "luck", name: "幸运药水", time: 10, tooltips: "提高运气", desc: "提高运气。<br>• 大于10分钟：+0.3<br>• 大于5分钟：+0.2<br>• 5分钟内：+0.1", materials: { "瓶装水": 1, "水叶草": 1, "瓢虫": 1, "黑珍珠": 1 }, icon: "Luck_Potion.png" }
                    ]
                },
                {
                    id: "cat_misc",
                    name: "杂项",
                    desc: "其他用途",
                    items: [
                        { id: "gravitation", name: "重力药水", time: 3, tooltips: "可控制重力", desc: "让玩家可以用上键逆转重力。", materials: { "瓶装水": 1, "火焰花": 1, "死亡草": 1, "闪耀根": 1, "羽毛": 1 }, icon: "Gravitation_Potion.png" }
                    ]
                }
            ]
        }
    ];

    // ==================== 全局状态 ====================
    let currentMode = 'time';
    let activePotionIds = new Set();
    let lastBottles = {};
    let lastMats = {};

    let flatPotions = [];
    let categoryTree = [];
    let maxDepth = 0;

    const modeReel = document.getElementById('mode-reel');
    const globalInput = document.getElementById('global-val');
    const unitText = document.getElementById('unit-text');
    const presetContainer = document.getElementById('preset-container');
    const categoryListEl = document.getElementById('category-list');
    const bottleOutput = document.getElementById('bottle-output');
    const matOutput = document.getElementById('mat-output');
    const totalInfo = document.getElementById('total-info');

    const globalSelect = document.getElementById('global-select');
    const expandAllBtn = document.getElementById('expand-all');
    const collapseAllBtn = document.getElementById('collapse-all');

    let fadeTimer = null;
    let removeTimer = null; // 用于材料删除动画

    // ==================== 解析 ====================
    function parseHierarchy(nodes, parentPath = []) {
        let flat = [];
        function traverse(node, currentPath) {
            if (node.items) {
                node.items.forEach(potion => {
                    flat.push({ ...potion, path: currentPath });
                });
            }
            for (let key in node) {
                if (key.startsWith('list_') && Array.isArray(node[key])) {
                    node[key].forEach(child => traverse(child, [...currentPath, node.id]));
                }
            }
        }
        nodes.forEach(root => traverse(root, []));
        return flat;
    }

    function buildCategoryTree(nodes, depth = 0) {
        if (depth > maxDepth) maxDepth = depth;
        return nodes.map(node => {
            const children = [];
            for (let key in node) {
                if (key.startsWith('list_') && Array.isArray(node[key])) {
                    children.push(...buildCategoryTree(node[key], depth + 1));
                }
            }
            return {
                id: node.id,
                name: node.name,
                desc: node.desc || '',
                children,
                items: node.items || [],
                checked: false,
                indeterminate: false,
                expanded: false,
                depth
            };
        });
    }

    function getColorForDepth(depth) {
        if (maxDepth === 0) return '#FFAA00';
        const start = { r: 0xFF, g: 0xAA, b: 0x00 };
        const end = { r: 0x00, g: 0xAA, b: 0xFF };
        const ratio = depth / maxDepth;
        const r = Math.round(start.r + (end.r - start.r) * ratio);
        const g = Math.round(start.g + (end.g - start.g) * ratio);
        const b = Math.round(start.b + (end.b - start.b) * ratio);
        return `rgb(${r}, ${g}, ${b})`;
    }

    // 更新分类复选框状态（递归）
    function updateCategoryCheckState(catNode) {
        const allIds = [];
        function collect(node) {
            if (node.items) node.items.forEach(p => allIds.push(p.id));
            node.children.forEach(child => collect(child));
        }
        collect(catNode);
        if (allIds.length === 0) {
            catNode.checked = false;
            catNode.indeterminate = false;
            return;
        }
        let selected = 0;
        allIds.forEach(id => { if (activePotionIds.has(id)) selected++; });
        if (selected === allIds.length) {
            catNode.checked = true;
            catNode.indeterminate = false;
        } else if (selected === 0) {
            catNode.checked = false;
            catNode.indeterminate = false;
        } else {
            catNode.checked = false;
            catNode.indeterminate = true;
        }
        catNode.children.forEach(child => updateCategoryCheckState(child));
    }

    function refreshCategoryTreeState() {
        categoryTree.forEach(root => updateCategoryCheckState(root));
        updateGlobalCheckbox();
    }

    // 更新全局复选框状态
    function updateGlobalCheckbox() {
        const totalCount = flatPotions.length;
        if (totalCount === 0) {
            globalSelect.checked = false;
            globalSelect.indeterminate = false;
            return;
        }
        let selectedCount = 0;
        flatPotions.forEach(p => { if (activePotionIds.has(p.id)) selectedCount++; });
        if (selectedCount === totalCount) {
            globalSelect.checked = true;
            globalSelect.indeterminate = false;
        } else if (selectedCount === 0) {
            globalSelect.checked = false;
            globalSelect.indeterminate = false;
        } else {
            globalSelect.checked = false;
            globalSelect.indeterminate = true;
        }
    }

    function getPotionIdsInCategory(catId) {
        const ids = [];
        function find(nodes) {
            for (let node of nodes) {
                if (node.id === catId) {
                    function collect(node) {
                        if (node.items) node.items.forEach(p => ids.push(p.id));
                        node.children.forEach(child => collect(child));
                    }
                    collect(node);
                    return true;
                }
                if (node.children.length && find(node.children)) return true;
            }
            return false;
        }
        find(categoryTree);
        return ids;
    }

    function toggleCategory(catId, checked) {
        const ids = getPotionIdsInCategory(catId);
        if (checked) ids.forEach(id => activePotionIds.add(id));
        else ids.forEach(id => activePotionIds.delete(id));
        refreshCategoryTreeState();
        // 更新所有卡片的active类
        document.querySelectorAll('.potion-item').forEach(card => {
            const id = card.dataset.id;
            card.classList.toggle('active', activePotionIds.has(id));
        });
        // 更新所有分类复选框状态
        updateCheckboxesFromTree();
        doCalc();
    }

    // 遍历DOM树，根据categoryTree设置复选框状态
    function updateCheckboxesFromTree() {
        const checkboxes = document.querySelectorAll('.category-checkbox');
        checkboxes.forEach(cb => {
            const catId = cb.dataset.id;
            const node = findCategoryNode(categoryTree, catId);
            if (node) {
                cb.checked = node.checked;
                cb.indeterminate = node.indeterminate;
            }
        });
    }

    function findCategoryNode(nodes, id) {
        for (let node of nodes) {
            if (node.id === id) return node;
            if (node.children.length) {
                const found = findCategoryNode(node.children, id);
                if (found) return found;
            }
        }
        return null;
    }

    function toggleExpand(catId) {
        function find(nodes) {
            for (let node of nodes) {
                if (node.id === catId) {
                    node.expanded = !node.expanded;
                    return true;
                }
                if (node.children.length && find(node.children)) return true;
            }
            return false;
        }
        find(categoryTree);
        // 只更新受影响节点的expanded类，而不重新渲染整个列表
        const nodeDiv = document.querySelector(`.category-node[data-id="${catId}"]`);
        if (nodeDiv) {
            nodeDiv.classList.toggle('expanded', findCategoryNode(categoryTree, catId).expanded);
        }
    }

    function renderPotionCard(p) {
        const iconHtml = p.icon ? `<img src="${IMG_BASE_URL}${p.icon}" alt="">` : '';
        return `
            <div class="potion-item ${activePotionIds.has(p.id) ? 'active' : ''}" data-id="${p.id}">
                <div class="toggle-btn"></div>
                <div class="p-body">
                    <div class="potion-name">
                        ${iconHtml}
                        <span>${p.name}</span>
                    </div>
                    <div class="p-tips">${p.tooltips} ${p.time ? `(${p.time}分钟)` : ''}</div>
                    <div class="p-desc">${p.desc}</div>
                    ${p.prodesc ? `
                    <div class="prodesc-container">
                        <div class="prodesc-text">📜 ${p.prodesc}</div>
                    </div>` : ''}
                </div>
            </div>
        `;
    }

    // 初次渲染整个列表
    function renderCategoryList() {
        function renderNode(node, depth) {
            const hasChildren = node.children.length > 0;
            const expandSymbol = node.expanded ? '▼' : '▶';
            const borderColor = getColorForDepth(depth);
            const itemsHtml = node.items ? node.items.map(p => renderPotionCard(p)).join('') : '';
            const childrenHtml = node.children.map(child => renderNode(child, depth + 1)).join('');
            return `
                <div class="category-node ${node.expanded ? 'expanded' : ''}" style="border-left-color: ${borderColor};" data-id="${node.id}">
                    <div class="category-header">
                        <input type="checkbox" class="category-checkbox" data-id="${node.id}" 
                            ${node.checked ? 'checked' : ''} 
                            ${node.indeterminate ? 'indeterminate' : ''}>
                        <span class="category-name">${node.name}</span>
                        ${node.desc ? `<span class="category-desc">— ${node.desc}</span>` : ''}
                        ${hasChildren ? `<span class="category-expand">${expandSymbol}</span>` : ''}
                    </div>
                    <div class="category-children">
                        ${itemsHtml}
                        ${childrenHtml}
                    </div>
                </div>
            `;
        }

        categoryListEl.innerHTML = categoryTree.map(root => renderNode(root, 0)).join('');

        // 绑定复选框事件
        document.querySelectorAll('.category-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                e.stopPropagation();
                toggleCategory(e.target.dataset.id, e.target.checked);
            });
        });

        // 绑定展开/折叠事件
        document.querySelectorAll('.category-header').forEach(header => {
            header.addEventListener('click', (e) => {
                if (e.target.classList.contains('category-checkbox')) return;
                const nodeDiv = header.closest('.category-node');
                toggleExpand(nodeDiv.dataset.id);
            });
        });

        // 绑定卡片点击
        document.querySelectorAll('.potion-item').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = card.dataset.id;
                if (activePotionIds.has(id)) {
                    activePotionIds.delete(id);
                } else {
                    activePotionIds.add(id);
                }
                // 切换卡片 active 类
                card.classList.toggle('active');
                // 更新分类树状态
                refreshCategoryTreeState();
                // 更新所有复选框状态
                updateCheckboxesFromTree();
                doCalc();
            });
        });
    }

    // ==================== 初始化数据 ====================
    function initData() {
        flatPotions = parseHierarchy(potionHierarchy);
        categoryTree = buildCategoryTree(potionHierarchy, 0);
        activePotionIds.clear();
        refreshCategoryTreeState();
    }

    // ==================== 全局全选功能 ====================
    function toggleGlobalSelect(checked) {
        if (checked) {
            flatPotions.forEach(p => activePotionIds.add(p.id));
        } else {
            activePotionIds.clear();
        }
        refreshCategoryTreeState();
        // 更新所有卡片
        document.querySelectorAll('.potion-item').forEach(card => {
            const id = card.dataset.id;
            card.classList.toggle('active', activePotionIds.has(id));
        });
        // 更新所有分类复选框
        updateCheckboxesFromTree();
        doCalc();
    }

    // ==================== 全展开/全收起 ====================
    function expandAll() {
        function setExpanded(nodes, expanded) {
            nodes.forEach(node => {
                node.expanded = expanded;
                if (node.children.length) setExpanded(node.children, expanded);
            });
        }
        setExpanded(categoryTree, true);
        document.querySelectorAll('.category-node').forEach(nodeDiv => {
            const catId = nodeDiv.dataset.id;
            const node = findCategoryNode(categoryTree, catId);
            if (node) {
                nodeDiv.classList.toggle('expanded', node.expanded);
            }
        });
    }

    function collapseAll() {
        function setExpanded(nodes, expanded) {
            nodes.forEach(node => {
                node.expanded = expanded;
                if (node.children.length) setExpanded(node.children, expanded);
            });
        }
        setExpanded(categoryTree, false);
        document.querySelectorAll('.category-node').forEach(nodeDiv => {
            const catId = nodeDiv.dataset.id;
            const node = findCategoryNode(categoryTree, catId);
            if (node) {
                nodeDiv.classList.toggle('expanded', node.expanded);
            }
        });
    }

    // ==================== 其他功能 ====================
    function handleWheel(e) {
        e.preventDefault();
        if (document.activeElement !== globalInput) return;
        const delta = e.deltaY > 0 ? -1 : 1;
        let newVal = parseInt(globalInput.value, 10) + delta;
        if (isNaN(newVal) || newVal < 1) newVal = 1;
        globalInput.value = newVal;
        globalInput.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function animateInput() {
        globalInput.classList.add('input-flash');
        setTimeout(() => globalInput.classList.remove('input-flash'), 300);
    }

    window.toggleMode = function() {
        currentMode = (currentMode === 'time' ? 'qty' : 'time');
        modeReel.style.transform = `translateY(${currentMode === 'time' ? '0' : '-36px'})`;
        updateUI(true);
    };

    function updateUI(isSwitch) {
        const vals = currentMode === 'time' ? [30, 60, 120, 300] : [10, 30, 99, 300];
        const newUnitText = currentMode === 'time' ? '分钟' : '瓶';
        
        if (isSwitch) {
            if (fadeTimer) clearTimeout(fadeTimer);

            const currentBtns = presetContainer.querySelectorAll('.btn-preset');
            currentBtns.forEach(btn => btn.classList.add('btn-preset-fade-out'));
            unitText.classList.add('unit-fade-out');

            fadeTimer = setTimeout(() => {
                unitText.innerText = newUnitText;
                unitText.classList.remove('unit-fade-out');

                presetContainer.innerHTML = vals.map(v => 
                    `<div class="btn-preset ${v == globalInput.value ? 'active' : ''}" onclick="setVal(${v}, this)">${v}${newUnitText}</div>`
                ).join('');

                const newBtns = presetContainer.querySelectorAll('.btn-preset');
                newBtns.forEach(btn => btn.classList.add('btn-preset-appear'));
                setTimeout(() => {
                    newBtns.forEach(btn => btn.classList.remove('btn-preset-appear'));
                }, 300);

                doCalc();
                fadeTimer = null;
            }, 150);
        } else {
            unitText.innerText = newUnitText;
            presetContainer.innerHTML = vals.map(v => 
                `<div class="btn-preset ${v == globalInput.value ? 'active' : ''}" onclick="setVal(${v}, this)">${v}${newUnitText}</div>`
            ).join('');
            doCalc();
        }
    }

    window.setVal = function(v, el) {
        globalInput.value = v;
        animateInput();
        document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        doCalc();
    };

    window.validateAndCalc = function(input) {
        let val = parseInt(input.value, 10);
        if (isNaN(val) || val < 1) { val = 1; input.value = 1; }
        document.querySelectorAll('.btn-preset').forEach(b => {
            b.classList.toggle('active', parseInt(b.innerText) === val);
        });
        doCalc();
    };

    window.preventNegative = function(e) {
        if (e.key === '-' || e.key === 'e') e.preventDefault();
    };

    function attachGlobalEvents() {
        globalInput.addEventListener('keydown', window.preventNegative);
    }

    function doCalc() {
        const rawVal = parseFloat(globalInput.value) || 0;
        const val = Math.max(1, rawVal);
        let newMats = {}, newBottles = {}, totalB = 0;

        flatPotions.forEach(p => {
            if (activePotionIds.has(p.id)) {
                let b = (currentMode === 'qty' ? val : Math.ceil(val / p.time));
                newBottles[p.name] = (newBottles[p.name] || 0) + b;
                for (let m in p.materials) {
                    newMats[m] = (newMats[m] || 0) + (p.materials[m] * b);
                }
                totalB += b;
            }
        });

        totalInfo.innerText = totalB > 0 ? `(共 ${totalB} 瓶)` : '';
        smartUpdate(bottleOutput, newBottles, lastBottles, 
            k => `<span class="item-left">${k}</span>`, 
            v => v + ' 瓶'
        );
        smartUpdate(matOutput, newMats, lastMats, 
            k => {
                const icon = materialIcons[k] ? `<img src="${IMG_BASE_URL}${materialIcons[k]}" alt="">` : '';
                return `<span class="item-left">${icon}${k}</span>`;
            }, 
            v => "×" + v
        );
        lastBottles = {...newBottles};
        lastMats = {...newMats};
    }

    // 修改后的 smartUpdate，支持两步删除动画
    function smartUpdate(container, newData, oldData, formatKey, formatVal) {
        if (Object.keys(newData).length === 0) {
            const items = container.querySelectorAll('.line-item');
            if (items.length > 0) {
                items.forEach(el => { 
                    el.classList.add('line-removing');
                    setTimeout(() => {
                        el.classList.add('line-exit');
                        setTimeout(() => el.remove(), 500);
                    }, 300);
                });
                setTimeout(() => { 
                    if (container.children.length === 0) 
                        container.innerHTML = '<div class="empty-tip">未点选药水</div>'; 
                }, 800);
            } else {
                if (!container.querySelector('.empty-tip')) container.innerHTML = '<div class="empty-tip">未点选药水</div>';
            }
            return;
        }
        const emptyTip = container.querySelector('.empty-tip');
        if (emptyTip) emptyTip.remove();

        // 处理退出条目：先变红+删除线，再消失
        for (let k in oldData) {
            if (!(k in newData)) {
                const safeId = escapeKey(k);
                const el = container.querySelector(`[data-key="${safeId}"]`);
                if (el) {
                    el.classList.add('line-removing');
                    setTimeout(() => {
                        el.classList.add('line-exit');
                        setTimeout(() => el.remove(), 500);
                    }, 300);
                }
            }
        }

        // 新增/更新条目
        let enterIndex = 0;
        for (let k in newData) {
            const newVal = newData[k];
            const oldVal = oldData[k];
            const safeId = escapeKey(k);
            let el = container.querySelector(`[data-key="${safeId}"]`);

            if (oldVal === undefined) {
                if (el) el.remove(); // 移除残留（可能处于删除中）
                el = document.createElement('div');
                el.className = `line-item ${enterIndex % 2 === 0 ? 'line-enter-left' : 'line-enter-right'}`;
                el.setAttribute('data-key', safeId);
                el.innerHTML = `<span>${formatKey(k)}</span><span class="val-container"><span class="val-text">${formatVal(newVal)}</span></span>`;
                container.appendChild(el);
                enterIndex++;
            } else if (newVal !== oldVal) {
                if (el) {
                    // 如果处于删除中，先移除删除相关类
                    el.classList.remove('line-removing', 'line-exit');
                    const valContainer = el.querySelector('.val-container');
                    const valText = el.querySelector('.val-text');
                    valText.innerText = formatVal(newVal);
                    valText.classList.remove('val-flash');
                    void valText.offsetWidth;
                    valText.classList.add('val-flash');
                    const delta = newVal - oldVal;
                    const deltaEl = document.createElement('span');
                    deltaEl.className = `delta-pop ${delta > 0 ? 'delta-pos' : 'delta-neg'}`;
                    deltaEl.innerText = (delta > 0 ? '+' : '') + delta;
                    valContainer.appendChild(deltaEl);
                    setTimeout(() => deltaEl.remove(), 1200); // 延长至1.2s
                }
            }
        }
    }

    function escapeKey(key) {
        return encodeURIComponent(key).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16));
    }

    // ==================== 启动 ====================
    function init() {
        initData();
        renderCategoryList();
        updateUI(true);
        attachGlobalEvents();
        globalInput.addEventListener('wheel', handleWheel, { passive: false });

        // 全局全选监听
        globalSelect.addEventListener('change', (e) => {
            toggleGlobalSelect(e.target.checked);
        });

        // 全展开/全收起监听
        expandAllBtn.addEventListener('click', expandAll);
        collapseAllBtn.addEventListener('click', collapseAll);
    }

    init();
})();
</script>
